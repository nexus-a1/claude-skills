<svg xmlns="http://www.w3.org/2000/svg" width="560" height="620" viewBox="0 0 560 620">
  <title>claude-skills lockup</title>
  <desc>claude-skills logo with wordmark and nexus-a1 family tag.</desc>
  <rect width="560" height="620" fill="white"/>
  <!-- icon, centered horizontally -->
  <g transform="translate(180,60)">
    <polygon points="100,10 187,60 187,160 100,210 13,160 13,60"
             fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
    <path d="M 145 85 L 70 85 L 70 115 L 130 115 L 130 145 L 55 145"
          fill="none" stroke="#1a1a1a" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="145" cy="85"  r="11" fill="#2563eb"/>
    <circle cx="55"  cy="145" r="11" fill="#2563eb"/>
  </g>
  <!-- wordmark, centered below icon -->
  <text x="280" y="380" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="500" fill="#1a1a1a">claude-skills</text>
  <text x="280" y="425" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="18" font-weight="400" fill="#6b6b6b" letter-spacing="6">a nexus-a1 project</text>
</svg>
